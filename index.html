<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DeVibe TelePortal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            padding: 16px;
        }

        .header {
            text-align: center;
            padding: 12px 0 20px;
            position: relative;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header p {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 4px;
        }

        .pin-btn {
            position: absolute;
            top: 12px;
            right: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s;
        }

        .pin-btn:active {
            transform: scale(0.9);
        }

        .pinned {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 3px solid var(--tg-theme-button-color, #6c5ce7);
            display: none;
        }

        .pinned-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 6px;
        }

        .pinned-text {
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pinned-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 12px;
            color: var(--tg-theme-link-color, #6c9bd1);
            text-decoration: none;
            cursor: pointer;
        }

        .portals {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .portal-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .portal-card:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .portal-icon {
            font-size: 32px;
        }

        .portal-name {
            font-size: 14px;
            font-weight: 600;
        }

        .portal-desc {
            font-size: 11px;
            color: var(--tg-theme-hint-color, #888);
        }

        .portal-card.disabled {
            opacity: 0.35;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DeVibe TelePortal</h1>
        <p>Выбери куда телепортироваться</p>
        <button class="pin-btn" id="pin-btn">📌</button>
    </div>

    <div class="pinned" id="pinned-block">
        <div class="pinned-label">📌 Закреп</div>
        <div class="pinned-text" id="pinned-text"></div>
        <a class="pinned-link" id="pinned-link">перейти →</a>
    </div>

    <div class="portals">
        <a class="portal-card" id="pnl-portal" href="#">
            <span class="portal-icon">📊</span>
            <span class="portal-name">PnL Bot</span>
            <span class="portal-desc">Прибыль и убытки</span>
        </a>

        <div class="portal-card disabled">
            <span class="portal-icon">📈</span>
            <span class="portal-name">Trade</span>
            <span class="portal-desc">Скоро</span>
        </div>

        <div class="portal-card disabled">
            <span class="portal-icon">🔍</span>
            <span class="portal-name">Analytics</span>
            <span class="portal-desc">Скоро</span>
        </div>

        <div class="portal-card disabled">
            <span class="portal-icon">⚙️</span>
            <span class="portal-name">Settings</span>
            <span class="portal-desc">Скоро</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const PORTALS = {
            'pnl-portal': 'https://t.me/DeVibe_LFG_PNL',
        };

        Object.entries(PORTALS).forEach(([id, url]) => {
            document.getElementById(id).addEventListener('click', (e) => {
                e.preventDefault();
                tg.openTelegramLink(url);
                tg.close();
            });
        });

        let pinnedLink = '';

        // Pin button in header — opens Закрепы chat
        document.getElementById('pin-btn').addEventListener('click', () => {
            tg.openTelegramLink('https://t.me/+S5Za2TEIiIg5YThi');
        });

        function loadPinned() {
            fetch('https://raw.githubusercontent.com/vitalytrue13-bit/devibe-teleportal/main/pinned.json?' + Date.now())
                .then(r => r.json())
                .then(data => {
                    if (data.text) {
                        document.getElementById('pinned-text').textContent = data.text;
                        document.getElementById('pinned-block').style.display = 'block';
                        document.getElementById('pin-btn').style.display = 'flex';
                        if (data.link) pinnedLink = data.link;
                    }
                })
                .catch(() => {});
        }

        document.getElementById('pinned-link').addEventListener('click', (e) => {
            e.preventDefault();
            if (pinnedLink) tg.openTelegramLink(pinnedLink);
        });

        loadPinned();
        setInterval(loadPinned, 30000);

        // Refresh when app returns from background
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) loadPinned();
        });
    </script>
</body>
</html>
